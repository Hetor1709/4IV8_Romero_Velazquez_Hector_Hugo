<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promedio</title>
    <script src="./JS/Ejercicio4.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/styles.css">
    <link rel="stylesheet" href="../css/portafolio.css">
</head>
<body>
    <div style="padding:0.6rem 1rem; background:#2A2D34; display:flex; gap:0.6rem;"><a class="pf-nav-back" href="./menu.html">← Menú Ejercicios</a><a class="pf-nav-back" href="../index.html" style="background:#6761A8;">⌂ Portafolio</a></div>

    <h1>Ejercicio 4</h1>

    <form name="formulario4" method="post" id="formulario4" onsubmit="return calcularPromedio(this);">
        
        <label for="cal1">
            Calificaciones departamentales (55%)
            <br>
            <input type="number" step="0.1" name="cal1" id="cal1" placeholder="Ingrese la primera calificación">
        </label>
        <br>

        <label for="cal2">
            <br>
            <input type="number" step="0.1" name="cal2" id="cal2" placeholder="Ingrese la segunda calificación">
        </label>
        <br>

        <label for="cal3">
            <br>
            <input type="number" step="0.1" name="cal3" id="cal3" placeholder="Ingrese la tercera calificación">
        </label>
        <br>

        <label for="examen">
            Examen final (35%)
            <br>
            <input type="number" step="0.1" name="examen" id="examen" placeholder="Ingrese la calificación del examen">
        </label>
        <br>

        <label for="trabajoFinal">
            Trabajo final (15%)
            <br>
            <input type="number" step="0.1" name="trabajoFinal" id="trabajoFinal" placeholder="Ingrese la calificación del trabajo">
        </label>
        <br>

        <input type="submit" name="enviar" id="enviar" value="Calcular">
        <input type="reset" name="borrar" id="borrar" value="Limpiar">

    </form>

    <h2 id="resultado"></h2>

    <a href="./menu.html">Volver al menú</a>

</body>
</html>
