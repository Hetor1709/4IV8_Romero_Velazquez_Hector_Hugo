<!DOCTYPE html>
<html lang="es">
<head>

    <script src="./JS/Ejercicio5.js"></script>

<body>

    <h1>Ejercicio 5</h1>

    <form name="formulario5" method="post" id="formulario5" onsubmit="return calcularPorcentaje(this);">

            Número de hombres
            <br>
            <input type="number" name="hombre" id="hombre" placeholder="Ingrese la cantidad de hombres">

        <label for="mujer">

        </label>
        <br>

        <input type="submit" name="enviar" id="enviar" value="Calcular">
        <input type="reset" name="borrar" id="borrar" value="Limpiar">

    </form>

    <h2 id="resultado"></h2>
