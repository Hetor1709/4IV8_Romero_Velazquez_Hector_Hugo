<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primer Ejercicio</title>
  </head>

  <body>
    <div class="Ejercicio1">
      <form id="formularioejer1">
        <label>Formulario para calcular una inversión al 10% anual</label>

        <table>
          <tr>
            <td>Introduce la cantidad que deseas invertir por 1 año:</td>
            <td>
              <input
                type="text"
                id="cantidadi"
                onkeypress="return validarn(event);"
              />
            </td>
          </tr>

          <tr>
            <td></td>
            <td>
              <input
                type="button"
                value="Calcular interés"
                onclick="interes()"
              />
            </td>
          </tr>

          <tr>
            <td>Su saldo es de:</td>
            <td>
              <input
                type="text"
                id="sueldo1"
                readonly
              />
            </td>
          </tr>

          <tr>
            <td></td>
            <td>
              <input
                type="button"
                value="Borrar Datos"
                onclick="borrar()"
              />
            </td>
          </tr>
        </table>
      </form>
    </div>

    <script src="./js/interes.js"></script>
  </body>
</html>
